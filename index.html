<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Viewer</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171c;
    --border: #232831;
    --text: #e6e8eb;
    --muted: #8a909c;
    --accent: #4f8cff;
    --danger: #ff5c5c;
    --ok: #36c98f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px 16px;
  }
  h1 {
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 18px;
    letter-spacing: 0.2px;
  }
  .panel {
    width: 100%;
    max-width: 480px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    background: #0e1014;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    margin-bottom: 12px;
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    margin-top: 8px;
  }
  video {
    width: 100%;
    max-width: 480px;
    border-radius: 12px;
    background: #000;
    aspect-ratio: 16/9;
  }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
  }
  .dot.connected { background: var(--ok); }
  .dot.error { background: var(--danger); }
</style>
</head>
<body>

<h1>Conectar al broadcaster</h1>

<div class="panel" id="config-panel">
  <label for="server-url">URL del servidor (tunnel)</label>
  <input id="server-url" type="text" placeholder="https://xxxx.trycloudflare.com" />

  <label for="access-key">Access key</label>
  <input id="access-key" type="password" placeholder="clave de acceso" />

  <button id="connect-btn">Conectar</button>
</div>

<div class="status">
  <span class="dot" id="status-dot"></span>
  <span id="status-text">Desconectado</span>
</div>

<video id="remote-video" autoplay playsinline controls></video>

<button class="secondary" id="disconnect-btn" style="max-width:480px; display:none;">Desconectar</button>

<script>
  const els = {
    serverUrl: document.getElementById('server-url'),
    accessKey: document.getElementById('access-key'),
    connectBtn: document.getElementById('connect-btn'),
    disconnectBtn: document.getElementById('disconnect-btn'),
    statusDot: document.getElementById('status-dot'),
    statusText: document.getElementById('status-text'),
    video: document.getElementById('remote-video'),
  };

  let pc = null;
  let connectionId = null;

  els.serverUrl.value = localStorage.getItem('server_url') || '';
  els.accessKey.value = localStorage.getItem('access_key') || '';

  function setStatus(text, state) {
    els.statusText.textContent = text;
    els.statusDot.className = 'dot' + (state ? ' ' + state : '');
  }

  function normalizeUrl(url) {
    return url.trim().replace(/\/$/, '');
  }

  async function connect() {
    const baseUrl = normalizeUrl(els.serverUrl.value);
    const key = els.accessKey.value.trim();

    if (!baseUrl || !key) {
      alert('Completa la URL del servidor y el access key');
      return;
    }

    localStorage.setItem('server_url', baseUrl);
    localStorage.setItem('access_key', key);

    els.connectBtn.disabled = true;
    setStatus('Conectando...');

    try {
      const res = await fetch(`${baseUrl}/viewer/connect`, {
        method: 'GET',
        headers: { 'X-Access-Key': key },
      });

      if (res.status === 401) throw new Error('Access key invalida');
      if (res.status === 503) throw new Error('No hay broadcaster activo');
      if (!res.ok) throw new Error('Error del servidor: ' + res.status);

      const offerData = await res.json();
      connectionId = offerData.connectionId;

      pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
      });

      pc.ontrack = (event) => {
        els.video.srcObject = event.streams[0];
      };

      pc.onconnectionstatechange = () => {
        if (pc.connectionState === 'connected') {
          setStatus('Conectado', 'connected');
        } else if (['failed', 'disconnected', 'closed'].includes(pc.connectionState)) {
          setStatus('Desconectado', 'error');
        }
      };

      await pc.setRemoteDescription(new RTCSessionDescription({
        sdp: offerData.sdp,
        type: offerData.type,
      }));

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      const answerRes = await fetch(`${baseUrl}/viewer/answer`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Access-Key': key,
        },
        body: JSON.stringify({
          connectionId,
          sdp: pc.localDescription.sdp,
          type: pc.localDescription.type,
        }),
      });

      if (!answerRes.ok) throw new Error('Error enviando answer');

      document.getElementById('config-panel').style.display = 'none';
      els.disconnectBtn.style.display = 'block';
    } catch (err) {
      setStatus(err.message, 'error');
      els.connectBtn.disabled = false;
    }
  }

  async function disconnect() {
    const baseUrl = normalizeUrl(els.serverUrl.value);
    const key = els.accessKey.value.trim();

    if (connectionId) {
      try {
        await fetch(`${baseUrl}/stop`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Access-Key': key,
          },
          body: JSON.stringify({ connectionId }),
        });
      } catch (_) {}
    }

    if (pc) {
      pc.close();
      pc = null;
    }

    els.video.srcObject = null;
    connectionId = null;
    setStatus('Desconectado');
    els.connectBtn.disabled = false;
    document.getElementById('config-panel').style.display = 'block';
    els.disconnectBtn.style.display = 'none';
  }

  els.connectBtn.addEventListener('click', connect);
  els.disconnectBtn.addEventListener('click', disconnect);
</script>

</body>
</html>
